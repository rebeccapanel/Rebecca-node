name: Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Resolve image tags
        id: image_tags
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          tags="ghcr.io/rebeccapanel/rebecca-node:latest"$'\n'"ghcr.io/rebeccapanel/rebecca-node:${GITHUB_REF_NAME}"
          dockerhub_enabled=false
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            dockerhub_enabled=true
            tags="${tags}"$'\n'"rebeccapanel/rebecca-node:latest"$'\n'"rebeccapanel/rebecca-node:${GITHUB_REF_NAME}"
          fi
          echo "dockerhub_enabled=${dockerhub_enabled}" >> "${GITHUB_OUTPUT}"
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        id: dockerhub_login
        if: steps.image_tags.outputs.dockerhub_enabled == 'true'
        continue-on-error: true
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Finalize image tags
        id: final_image_tags
        shell: bash
        run: |
          set -euo pipefail
          tags="ghcr.io/rebeccapanel/rebecca-node:latest"$'\n'"ghcr.io/rebeccapanel/rebecca-node:${GITHUB_REF_NAME}"
          if [[ "${{ steps.dockerhub_login.outcome }}" == "success" ]]; then
            tags="${tags}"$'\n'"rebeccapanel/rebecca-node:latest"$'\n'"rebeccapanel/rebecca-node:${GITHUB_REF_NAME}"
          fi
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.final_image_tags.outputs.tags }}
